<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모바일 IMU + 프레임 전송 테스트</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      line-height: 1.5;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    button {
      padding: 12px 18px;
      margin-right: 10px;
      margin-bottom: 10px;
      border: none;
      border-radius: 20px;
      background: #e9e9e9;
      font-size: 16px;
    }
    #status {
      font-size: 18px;
      margin: 18px 0;
    }
    video, canvas {
      width: 100%;
      max-width: 360px;
      border: 1px solid #ccc;
      margin-bottom: 16px;
    }
    #log {
      white-space: pre-wrap;
      background: #f3f3f3;
      padding: 14px;
      min-height: 180px;
      border-radius: 6px;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <h1>모바일 IMU + 프레임 전송 테스트</h1>

  <button id="startBtn">센서/카메라 시작</button>
  <button id="sendFrameBtn">프레임 1장 전송</button>

  <div id="status">대기중</div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

  <div id="log"></div>

  <script>
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let ws = null;
    let sessionId = null;
    let cameraEnabled = false;
    let imuEnabled = false;

    function log(msg) {
      console.log(msg);
      logEl.textContent += msg + "\n";
    }

    function nowTs() {
      return performance.timeOrigin + performance.now();
    }

    function getBaseUrl() {
      return window.location.origin;
    }

    function getWsUrl() {
      const origin = window.location.origin;
      if (origin.startsWith("https://")) {
        return origin.replace("https://", "wss://") + "/ws/mobile";
      } else {
        return origin.replace("http://", "ws://") + "/ws/mobile";
      }
    }

    async function requestMotionPermissionIfNeeded() {
      log("IMU 권한 요청 함수 진입");

      if (
        typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function"
      ) {
        log("iPhone 방식 권한 요청 필요");
        const result = await DeviceMotionEvent.requestPermission();
        log("IMU 권한 결과: " + result);

        if (result !== "granted") {
          throw new Error("IMU 권한이 허용되지 않음");
        }
      } else {
        log("별도 IMU 권한 요청 없이 진행");
      }
    }

    async function connectWebSocket() {
      log("WebSocket 연결 시도");
      return new Promise((resolve, reject) => {
        ws = new WebSocket(getWsUrl());

        ws.onopen = () => {
          log("WebSocket 연결됨");
          ws.send(JSON.stringify({ type: "hello" }));
        };

        ws.onmessage = (event) => {
          log("WS 수신: " + event.data);

          try {
            const data = JSON.parse(event.data);
            if (data.session_id) {
              sessionId = data.session_id;
              log("세션 ID 저장: " + sessionId);
            }
          } catch (e) {
            log("WS JSON 파싱 실패");
          }

          resolve();
        };

        ws.onerror = (err) => {
          log("WebSocket 오류 발생");
          reject(new Error("WebSocket 연결 실패"));
        };
      });
    }

    async function startCamera() {
      log("카메라 시작 시도");

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });

      video.srcObject = stream;
      cameraEnabled = true;
      log("카메라 시작 완료");
    }

    function startIMU() {
      if (imuEnabled) {
        log("IMU 이미 시작됨");
        return;
      }

      window.addEventListener("devicemotion", (event) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        const payload = {
          type: "imu",
          timestamp: nowTs(),
          accel: {
            x: event.acceleration?.x ?? null,
            y: event.acceleration?.y ?? null,
            z: event.acceleration?.z ?? null
          },
          accel_g: {
            x: event.accelerationIncludingGravity?.x ?? null,
            y: event.accelerationIncludingGravity?.y ?? null,
            z: event.accelerationIncludingGravity?.z ?? null
          },
          gyro: {
            alpha: event.rotationRate?.alpha ?? null,
            beta: event.rotationRate?.beta ?? null,
            gamma: event.rotationRate?.gamma ?? null
          },
          interval: event.interval ?? null
        };

        ws.send(JSON.stringify(payload));
      });

      imuEnabled = true;
      log("IMU 이벤트 수집 시작");
    }

    async function sendFrame() {
      log("프레임 전송 시도");

      if (!cameraEnabled) {
        alert("먼저 센서/카메라 시작을 눌러주세요.");
        return;
      }

      if (!sessionId) {
        alert("세션 ID가 없습니다. WebSocket 연결을 먼저 확인하세요.");
        return;
      }

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const blob = await new Promise((resolve) => {
        canvas.toBlob(resolve, "image/jpeg", 0.8);
      });

      const formData = new FormData();
      formData.append("session_id", sessionId);
      formData.append("timestamp", String(nowTs()));
      formData.append("frame", blob, "frame.jpg");

      const res = await fetch(getBaseUrl() + "/frame", {
        method: "POST",
        body: formData
      });

      const result = await res.json();
      log("프레임 업로드 응답: " + JSON.stringify(result));
    }

    log("스크립트 로드됨");
    log("현재 origin: " + window.location.origin);
    log("WebSocket 주소: " + getWsUrl());

    document.getElementById("startBtn").addEventListener("click", async () => {
      log("버튼 클릭됨");

      try {
        statusEl.textContent = "초기화 중...";
        log("1. IMU 권한 요청 시작");

        // 아이폰 대응: 클릭 직후 바로 실행
        await requestMotionPermissionIfNeeded();

        log("2. WebSocket 연결 시작");
        await connectWebSocket();

        log("3. 카메라 시작");
        await startCamera();

        log("4. IMU 시작");
        startIMU();

        statusEl.textContent = "센서/카메라 동작 중";
        log("초기화 완료");
      } catch (err) {
        console.error(err);
        statusEl.textContent = "오류 발생";
        log("오류: " + err.message);
      }
    });

    document.getElementById("sendFrameBtn").addEventListener("click", async () => {
      try {
        await sendFrame();
      } catch (err) {
        console.error(err);
        log("프레임 전송 오류: " + err.message);
      }
    });
  </script>
</body>
</html>
